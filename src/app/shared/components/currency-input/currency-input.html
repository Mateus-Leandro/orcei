<mat-form-field appearance="outline" class="input">
  <mat-label>{{ label }}</mat-label>

  <input
    matInput
    type="text"
    [placeholder]="placeholder"
    [value]="displayValue"
    [errorStateMatcher]="matcher"
    (input)="onInput($event)"
    (keydown)="onKeyDown($event)"
    (blur)="onBlur()"
  />

  @if (errorMessage) {
    <mat-error>
      {{ errorMessage }}
    </mat-error>
  }
</mat-form-field>
