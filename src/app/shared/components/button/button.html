<button
  [style.width]="width"
  [style.color]="disabled ? null : textColor"
  [style.background-color]="disabled ? null : bgColor"
  matButton="filled"
  [type]="type"
  [disabled]="disabled"
>
  @if (icon && iconPosition === 'left') {
    <mat-icon>{{ icon }}</mat-icon>
  }

  {{ text }}

  @if (icon && iconPosition === 'right') {
    <mat-icon>{{ icon }}</mat-icon>
  }
</button>
