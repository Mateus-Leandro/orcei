<table mat-table [dataSource]="displayedData" class="mat-elevation-z2 full-width-table">
  @for (column of columns; track column) {
    <ng-container [matColumnDef]="column">
      <th mat-header-cell *matHeaderCellDef>
        {{ column }}
      </th>

      <td mat-cell *matCellDef="let element" [class.editable-cell]="isEditable(column)">
        @if (isEditable(column)) {
          @if (isCellEditing(element, column)) {
            <input
              class="editable-input"
              type="text"
              inputmode="decimal"
              [mask]="cellMask(element, column)"
              decimalMarker=","
              thousandSeparator=""
              [dropSpecialCharacters]="false"
              [ngModel]="editValue"
              (ngModelChange)="onCellModelChange($event)"
              (keydown.enter)="onCellEnter($event)"
              (blur)="onCellBlur(element, column)"
              (click)="$event.stopPropagation()"
            />
          } @else {
            <span
              class="editable-display"
              (click)="startEditing(element, column, $event)"
            >
              {{ formatCellValue(element, column) }}
            </span>
          }
        } @else {
          {{ element[column] }}
        }
      </td>
    </ng-container>
  }

  @if (deleteButton) {
    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef class="delete-column">Remover</th>

      <td mat-cell *matCellDef="let element" class="delete-column">
        <app-icon-button
          icon="delete"
          bgColor="transparent"
          iconColor="red"
          (click)="onDelete(element); $event.stopPropagation()"
        />
      </td>
    </ng-container>
  }

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    [ngClass]="rowClass(row)"
    (click)="onRowClick(row)"
    style="cursor: pointer"
  ></tr>
</table>

@if (showPaginator) {
  <mat-paginator
    [length]="paginatorLength"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="pageSizeOptions"
    showFirstLastButtons
    (page)="handlePageEvent($event)"
  ></mat-paginator>
}
