<h2 mat-dialog-title>
  {{ data.title }}
</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end" style="gap: 15px">
  <app-button
    bgColor="var(--cancel-color)"
    (click)="close(false)"
    [text]="data.cancelText || 'Cancelar'"
  />

  <app-button
    bgColor="var(--save-color)"
    (click)="close(true)"
    [text]="data.confirmText || 'Confirmar'"
  />
</mat-dialog-actions>
