@if (loading()) {
  <app-spinner />
}

<app-entity-form-component
  icon="store"
  [formGroup]="form"
  (submitEvent)="onSubmit()"
  (cancelEvent)="goBack()"
  titleCard="Informações da Loja"
  subtitle="Preencha as informações da loja"
>
  <div class="form-container">
    <app-form-field
      label="Número da loja"
      placeholder="Digite o número da loja"
      type="number"
      [control]="storeNumberControl"
    />
    <div class="row">
      <div class="field">
        <app-form-field
          label="Telefone"
          placeholder="(00) 00000-0000"
          mask="(00) 0000-0000||(00) 00000-0000"
          [control]="phoneControl"
        />
      </div>
      <div class="field">
        <app-form-field
          label="CNPJ"
          placeholder="00.000.000/0000-00"
          mask="00.000.000/0000-00"
          [control]="cnpjControl"
        />
      </div>
      <div class="field">
        <app-form-field
          label="Nome para exibição"
          placeholder="Digite o nome da loja"
          [control]="nameControl"
        />
      </div>
    </div>
  </div>
</app-entity-form-component>
