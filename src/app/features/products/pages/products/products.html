@if (loading()) {
  <app-spinner />
}

<app-card-container
  title="Produtos Cadastrados"
  placeholder="Pesquisar produto"
  label="Pesquisar produto"
  (searchValue)="onSearch($event)"
  (addItem)="navigateToProductForm()"
>
  <app-product-table
    [products]="products()"
    [totalItems]="totalItems"
    (pageChange)="loadProducts($event)"
    (clickRow)="navigateToProductForm($event)"
  />
</app-card-container>
