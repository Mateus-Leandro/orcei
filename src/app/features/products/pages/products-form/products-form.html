<app-entity-form-component
  icon="sell"
  [formGroup]="formGroup"
  (submitEvent)="onSave()"
  (cancelEvent)="onCancel()"
  title="Cadastro de produto"
  subtitle="Preencha as informações do produto"
>
  <div>
    <div class="row">
      <div class="code">
        <app-form-field [readonly]="true" label="Código" [control]="codeControl" />
      </div>

      <div class="name">
        <app-form-field label="Nome" [control]="nameControl" />
      </div>
    </div>

    <div>
      <div style="flex-direction: row; justify-content: space-between; display: flex">
        <span>Código de barras</span>
        <app-button
          icon="add"
          text="Adicionar código de Barras"
          bgColor="transparent"
          textColor="var(--primary)"
        />
      </div>
    </div>
  </div>
</app-entity-form-component>
