@if (loading()) {
  <app-spinner />
}

<app-card-container
  titleCard="Orçamentos Cadastrados"
  placeholder="Pesquisar por cliente"
  label="Pesquisar orçamento"
  (searchValue)="onSearch($event)"
  (addItem)="navigateToBudgetForm()"
  tooltipText="Criar novo Orçamento"
>
  <app-budget-table
    [budgets]="budgets()"
    [totalItems]="totalItems"
    [pageIndex]="pageIndex"
    (pageChange)="loadBudgets($event)"
    (clickRow)="navigateToBudgetForm($event)"
    (deleteRow)="onDelete($event)"
  />
</app-card-container>
